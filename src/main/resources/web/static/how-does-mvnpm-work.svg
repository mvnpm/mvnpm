<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" fill="none" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="grad-light" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0.12"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3.5 L0,7z" fill="#9B8ABB"/>
    </marker>
  </defs>

  <!-- Boxes -->
  <rect x="40" y="80" width="180" height="60" rx="12" fill="url(#grad-light)" stroke="url(#grad)" stroke-width="1.5"/>
  <text x="130" y="106" text-anchor="middle" font-size="13" font-weight="600" fill="#8B8FA3">YOUR BUILD</text>
  <text x="130" y="124" text-anchor="middle" font-size="11" fill="#8B8FA3" font-family="'SF Mono', 'Fira Code', monospace">org.mvnpm:lit:3.1.3</text>

  <rect x="310" y="80" width="180" height="60" rx="12" fill="url(#grad-light)" stroke="url(#grad)" stroke-width="1.5"/>
  <text x="400" y="106" text-anchor="middle" font-size="13" font-weight="600" fill="#8B8FA3">MAVEN CENTRAL</text>
  <text x="400" y="124" text-anchor="middle" font-size="11" fill="#8B8FA3">Package not found</text>

  <rect x="580" y="80" width="180" height="60" rx="12" fill="url(#grad-light)" stroke="url(#grad)" stroke-width="1.5"/>
  <text x="670" y="106" text-anchor="middle" font-size="13" font-weight="600" fill="#8B8FA3">NPM REGISTRY</text>
  <text x="670" y="124" text-anchor="middle" font-size="11" fill="#8B8FA3" font-family="'SF Mono', 'Fira Code', monospace">lit@3.1.3</text>

  <rect x="260" y="250" width="280" height="66" rx="12" fill="url(#grad)"/>
  <text x="400" y="278" text-anchor="middle" font-size="16" font-weight="700" fill="white">{/> mvnpm</text>
  <text x="400" y="298" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.8)">Converts to JAR + POM, signs &amp; syncs</text>

  <!-- Arrow 1: Build → Maven Central (horizontal, top half of right side) -->
  <line x1="224" y1="100" x2="306" y2="100" stroke="#9B8ABB" stroke-width="1.5" marker-end="url(#arr)"/>
  <circle cx="265" cy="100" r="12" fill="url(#grad)"/>
  <text x="265" y="104" text-anchor="middle" font-size="11" font-weight="700" fill="white">1</text>

  <!-- Arrow 2: Build → mvnpm (right side bottom half, down then right to mvnpm top) -->
  <path d="M224,124 L265,124 L265,246" stroke="#9B8ABB" stroke-width="1.5" fill="none" stroke-linejoin="round" marker-end="url(#arr)"/>
  <circle cx="265" cy="186" r="12" fill="url(#grad)"/>
  <text x="265" y="190" text-anchor="middle" font-size="11" font-weight="700" fill="white">2</text>

  <!-- Arrow 3: mvnpm → NPM Registry (right side up) -->
  <path d="M544,283 L700,283 L700,144" stroke="#9B8ABB" stroke-width="1.5" fill="none" stroke-linejoin="round" marker-end="url(#arr)"/>
  <circle cx="700" cy="216" r="12" fill="url(#grad)"/>
  <text x="700" y="220" text-anchor="middle" font-size="11" font-weight="700" fill="white">3</text>

  <!-- Arrow 4: mvnpm → Build (left side up) -->
  <path d="M256,268 L60,268 L60,144" stroke="#9B8ABB" stroke-width="1.5" fill="none" stroke-linejoin="round" marker-end="url(#arr)"/>
  <circle cx="60" cy="208" r="12" fill="url(#grad)"/>
  <text x="60" y="212" text-anchor="middle" font-size="11" font-weight="700" fill="white">4</text>

  <!-- Sync: mvnpm → Maven Central (dashed up) -->
  <path d="M400,246 L400,144" stroke="#9B8ABB" stroke-width="1.5" fill="none" stroke-dasharray="5,4" marker-end="url(#arr)"/>
  <text x="414" y="200" font-size="10" fill="#8B8FA3" font-style="italic">sync</text>
</svg>
